{% if messages %}
<div class="fixed top-20 right-4 z-50 space-y-2 max-w-sm" x-data="{ shown: true }" x-show="shown" x-cloak>
    {% for message in messages %}
    <div class="px-4 py-3 rounded-lg shadow-lg text-sm flex items-start justify-between gap-3
        {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
        {% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
        {% elif message.tags == 'warning' %}bg-amber/10 text-amber-dark border border-amber/30
        {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}"
        x-data="{ visible: true }" x-show="visible" x-init="setTimeout(() => visible = false, 5000)">
        <span>{{ message }}</span>
        <button @click="visible = false" class="opacity-50 hover:opacity-100">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
