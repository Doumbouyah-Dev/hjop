{% extends "account/base_auth.html" %}
{% block auth_content %}
<div class="text-center">
    <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-green-600 text-2xl">✓</span>
    </div>
    <h1 class="text-2xl font-bold text-navy mb-2">Check Your Email</h1>
    <p class="text-gray-500">
        We've sent a password reset link. Since email is running in console mode during
        development, check your <strong>terminal window</strong> for the reset link.
    </p>
    <a href="{% url 'account_login' %}" class="inline-block mt-6 text-amber-dark hover:underline font-medium">
        Back to Sign In
    </a>
</div>
{% endblock %}
