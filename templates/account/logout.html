{% extends "account/base_auth.html" %}
{% block auth_content %}
<div class="text-center">
    <h1 class="text-2xl font-bold text-navy mb-2">Sign Out</h1>
    <p class="text-gray-500 mb-6">Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit"
            class="w-full bg-navy text-white hover:bg-opacity-90 font-semibold h-11 rounded-lg transition-colors">
            Sign Out
        </button>
    </form>
    <a href="{% url 'dashboard:home' %}" class="inline-block mt-4 text-sm text-gray-500 hover:underline">
        Cancel
    </a>
</div>
{% endblock %}
